<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3>High Score:
                        <span id="highscore">0</span>
                    </h3>
                    
                </div>
                <div class="info">
                    <h3>Score:
                        <span id="score">0</span>
                    </h3>
                    
                </div>
                <div class="info">
                    <h3>Time:
                        <span id="time">00-00</span>
                    </h3>
                    
                </div>
            </div>
            <div class="board">
                
            </div>
        </section>
    </main>
    <div class="modal start-game-modal">
        <div class="startgame">
            <h3>Welcome to the Snake Game</h3>
            <button class="btn startbtn">Start Game</button>
        </div>
    </div>
    <div class="modal game-over-modal">
        <div class="gameover">
            <h3>Game Over</h3>
            <button class="btn restartbtn">Restart</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
